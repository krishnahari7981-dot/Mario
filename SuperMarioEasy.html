<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Super Mario Easy</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: linear-gradient(180deg,#050510,#0D0D22);
    display:flex; flex-direction:column; align-items:center;
    justify-content:flex-start; min-height:100vh;
    font-family:'Courier New',monospace; overflow:hidden;
    touch-action:none; user-select:none;
  }
  #title {
    color:#FFD600; font-size:15px; font-weight:bold;
    margin:8px 0 5px; letter-spacing:3px;
    text-shadow:0 0 12px #FF8800;
  }
  #frame {
    position:relative;
    box-shadow:0 0 40px rgba(255,200,0,0.2),0 0 0 2px #FFD600AA,0 0 0 5px #1A1A3A;
  }
  canvas { display:block; }
  .overlay {
    position:absolute; inset:0; background:rgba(0,0,0,0.87);
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:14px;
  }
  .hidden { display:none !important; }
  .overlay-title { color:#FFD600; font-size:24px; font-weight:bold; letter-spacing:3px; text-shadow:0 0 20px #FF6600; }
  .overlay-sub { color:rgba(255,255,255,0.7); font-size:11px; letter-spacing:2px; }
  .overlay-info { color:#AAA; font-size:10px; text-align:center; max-width:210px; line-height:1.7; }
  .divider { width:220px; height:1px; background:rgba(255,214,0,0.25); }
  .btn-main {
    margin-top:8px; padding:13px 40px;
    border:3px solid rgba(255,255,255,0.3); border-radius:10px;
    color:#FFF; font-size:17px; font-weight:bold;
    cursor:pointer; letter-spacing:2px;
    box-shadow:0 6px 0 rgba(0,0,0,0.35);
    font-family:'Courier New',monospace;
  }
  .btn-start { background:linear-gradient(135deg,#FF5252,#B71C1C); }
  .btn-next  { background:linear-gradient(135deg,#43A047,#1B5E20); }
  .btn-again { background:linear-gradient(135deg,#FFD600,#FF8F00); color:#000; }
  .score-txt { color:#64FFDA; font-size:13px; }
  .stars-row { display:flex; gap:8px; font-size:20px; }
  #controls {
    display:flex; align-items:center; justify-content:space-between;
    width:380px; margin-top:14px; padding:0 10px;
  }
  #controls.hidden { display:none !important; }
  .dpad { display:flex; gap:10px; }
  .cbtn {
    border:none; outline:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-weight:bold; color:#FFF;
    border-radius:50%; touch-action:none;
  }
  .cbtn-lr {
    width:62px; height:62px; font-size:22px;
    background:radial-gradient(circle at 38% 35%,#1565C0EE,#1565C077);
    border:3px solid #1565C0;
    box-shadow:0 5px 0 #1565C055,0 8px 22px rgba(0,0,0,0.45);
  }
  .cbtn-jump {
    width:74px; height:74px; font-size:30px;
    background:radial-gradient(circle at 38% 35%,#C62828EE,#C6282877);
    border:3px solid #C62828;
    box-shadow:0 5px 0 #C6282855,0 8px 22px rgba(0,0,0,0.45);
  }
  #hint { color:#333; font-size:9px; margin-top:5px; }
  #hint.hidden { display:none !important; }
</style>
</head>
<body>

<div id="title">🍄 SUPER MARIO EASY 🍄</div>

<div id="frame">
  <canvas id="c" width="380" height="480"></canvas>

  <!-- MENU -->
  <div id="scr-menu" class="overlay">
    <div style="font-size:54px;filter:drop-shadow(0 4px 8px rgba(255,100,0,0.6))">🍄</div>
    <div class="overlay-title">SUPER MARIO</div>
    <div class="overlay-sub">5 EASY LEVELS • NO GAME OVER</div>
    <div class="divider"></div>
    <div class="overlay-info">Collect ⭐ stars and reach the 🚩 flag!<br>If you fall, you respawn — no deaths!</div>
    <button class="btn-main btn-start" id="btn-start">▶ START</button>
    <div style="color:#444;font-size:9px;margin-top:2px">WASD / Arrows + Space / Touch buttons</div>
  </div>

  <!-- LEVEL COMPLETE -->
  <div id="scr-lvlclear" class="overlay hidden">
    <div style="font-size:52px">🎉</div>
    <div class="overlay-title" style="font-size:22px">LEVEL CLEAR!</div>
    <div id="lc-stars" style="color:#FFF;font-size:13px;opacity:.85"></div>
    <div id="lc-score" class="score-txt"></div>
    <button class="btn-main btn-next" id="btn-next">NEXT LEVEL ▶</button>
  </div>

  <!-- GAME COMPLETE -->
  <div id="scr-win" class="overlay hidden">
    <div style="font-size:56px;filter:drop-shadow(0 4px 12px rgba(255,215,0,0.7))">🏆</div>
    <div class="overlay-title" style="text-shadow:0 0 20px gold">YOU WIN!</div>
    <div style="color:rgba(255,255,255,0.8);font-size:12px">All 5 worlds conquered!</div>
    <div id="win-score" style="color:#FFD600;font-size:20px;font-weight:bold"></div>
    <div class="stars-row">⭐⭐⭐⭐⭐</div>
    <button class="btn-main btn-again" id="btn-again">🔄 PLAY AGAIN</button>
  </div>
</div>

<div id="controls" class="hidden">
  <div class="dpad">
    <button class="cbtn cbtn-lr" id="btn-left">◀</button>
    <button class="cbtn cbtn-lr" id="btn-right">▶</button>
  </div>
  <button class="cbtn cbtn-jump" id="btn-jump">A</button>
</div>
<div id="hint" class="hidden">◀ ▶ to move • A or Space to jump</div>

<script>
// ─── Constants ───────────────────────────────────────
const GW=380,GH=480,GRAV=0.55,JVEL=-13,RUN=3.5,PW=28,PH=36;

// ─── Level Data ──────────────────────────────────────
const LEVELS=[
  {name:"World 1-1",worldW:1400,sky:["#87CEEB","#B0E2FF"],gTop:"#4CAF50",gBody:"#795548",
   platforms:[{x:0,y:440,w:1400,h:60},{x:220,y:360,w:110,h:18},{x:400,y:295,w:110,h:18},{x:600,y:360,w:110,h:18},{x:800,y:295,w:110,h:18},{x:1000,y:360,w:110,h:18}],
   coins:[{x:225,y:322},{x:265,y:322},{x:305,y:322},{x:405,y:257},{x:445,y:257},{x:485,y:257},{x:605,y:322},{x:645,y:322},{x:685,y:322},{x:805,y:257},{x:845,y:257},{x:885,y:257},{x:1005,y:322},{x:1045,y:322},{x:1085,y:322}],
   start:[60,395],flagX:1300},
  {name:"World 1-2",worldW:1600,sky:["#FFCC44","#FF8800"],gTop:"#C0782A",gBody:"#7D4E1A",
   platforms:[{x:0,y:440,w:270,h:60},{x:340,y:440,w:200,h:60},{x:600,y:440,w:200,h:60},{x:860,y:440,w:200,h:60},{x:1120,y:440,w:480,h:60},{x:200,y:340,w:120,h:18},{x:420,y:275,w:120,h:18},{x:650,y:340,w:120,h:18},{x:900,y:275,w:120,h:18},{x:1150,y:340,w:120,h:18}],
   coins:[{x:205,y:302},{x:255,y:302},{x:305,y:302},{x:425,y:237},{x:475,y:237},{x:515,y:237},{x:655,y:302},{x:705,y:302},{x:905,y:237},{x:955,y:237},{x:1155,y:302},{x:1215,y:302}],
   start:[60,395],flagX:1530},
  {name:"World 1-3",worldW:1800,sky:["#C9B8E8","#7B5EA7"],gTop:"#7C4DCA",gBody:"#4527A0",
   platforms:[{x:0,y:440,w:1800,h:60},{x:100,y:370,w:90,h:18},{x:260,y:310,w:90,h:18},{x:420,y:250,w:90,h:18},{x:580,y:310,w:90,h:18},{x:740,y:370,w:90,h:18},{x:900,y:310,w:90,h:18},{x:1060,y:250,w:90,h:18},{x:1220,y:310,w:90,h:18},{x:1380,y:370,w:90,h:18}],
   coins:[{x:105,y:332},{x:155,y:332},{x:265,y:272},{x:315,y:272},{x:425,y:212},{x:475,y:212},{x:585,y:272},{x:635,y:272},{x:745,y:332},{x:795,y:332},{x:905,y:272},{x:955,y:272},{x:1065,y:212},{x:1115,y:212},{x:1225,y:272},{x:1275,y:272}],
   start:[60,395],flagX:1710},
  {name:"World 1-4",worldW:2000,sky:["#FF6B45","#B71C1C"],gTop:"#BF360C",gBody:"#7F1D0A",
   platforms:[{x:0,y:440,w:180,h:60},{x:240,y:395,w:100,h:18},{x:400,y:335,w:100,h:18},{x:560,y:275,w:100,h:18},{x:720,y:335,w:100,h:18},{x:880,y:395,w:100,h:18},{x:1040,y:440,w:180,h:60},{x:1280,y:395,w:100,h:18},{x:1440,y:335,w:100,h:18},{x:1600,y:395,w:100,h:18},{x:1760,y:440,w:240,h:60}],
   coins:[{x:245,y:357},{x:295,y:357},{x:405,y:297},{x:455,y:297},{x:565,y:237},{x:615,y:237},{x:725,y:297},{x:775,y:297},{x:885,y:357},{x:935,y:357},{x:1285,y:357},{x:1335,y:357},{x:1445,y:297},{x:1495,y:297},{x:1605,y:357},{x:1655,y:357}],
   start:[60,395],flagX:1930},
  {name:"World 1-5 ★",worldW:2200,sky:["#0A0A1A","#1A1A3A"],gTop:"#1A237E",gBody:"#0D1444",
   platforms:[{x:0,y:440,w:2200,h:60},{x:80,y:370,w:80,h:18},{x:220,y:310,w:80,h:18},{x:360,y:250,w:80,h:18},{x:500,y:195,w:80,h:18},{x:640,y:250,w:80,h:18},{x:780,y:310,w:80,h:18},{x:920,y:370,w:80,h:18},{x:1060,y:310,w:80,h:18},{x:1200,y:250,w:80,h:18},{x:1340,y:195,w:80,h:18},{x:1480,y:250,w:80,h:18},{x:1620,y:310,w:80,h:18},{x:1760,y:370,w:80,h:18},{x:1900,y:310,w:80,h:18}],
   coins:[{x:85,y:332},{x:125,y:332},{x:225,y:272},{x:265,y:272},{x:365,y:212},{x:405,y:212},{x:505,y:157},{x:545,y:157},{x:645,y:212},{x:685,y:212},{x:785,y:272},{x:825,y:272},{x:925,y:332},{x:965,y:332},{x:1065,y:272},{x:1105,y:272},{x:1205,y:212},{x:1245,y:212},{x:1345,y:157},{x:1385,y:157}],
   start:[60,395],flagX:2110},
];

// ─── Game State ──────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const keys={left:false,right:false,jump:false};
let jumpConsumed=false;
let gs=null, raf=null, screen='menu', totalScore=0;

function initLevel(idx){
  const lvl=LEVELS[idx];
  gs={
    levelIdx:idx,
    player:{x:lvl.start[0],y:lvl.start[1],vx:0,vy:0,onGround:false,facing:1,frame:0,frameTimer:0},
    camX:0,
    coins:lvl.coins.map((c,i)=>({...c,id:i,collected:false})),
    coinsCollected:0,goalReached:false,particles:[],time:0,victimTimer:0
  };
}

function goToScreen(s){
  screen=s;
  document.getElementById('scr-menu').classList.toggle('hidden', s!=='menu');
  document.getElementById('scr-lvlclear').classList.toggle('hidden', s!=='levelComplete');
  document.getElementById('scr-win').classList.toggle('hidden', s!=='complete');
  document.getElementById('controls').classList.toggle('hidden', s!=='playing');
  document.getElementById('hint').classList.toggle('hidden', s!=='playing');
  if(s==='playing'){
    if(raf) cancelAnimationFrame(raf);
    raf=requestAnimationFrame(loop);
  } else {
    if(raf){cancelAnimationFrame(raf);raf=null;}
  }
}

// ─── Drawing ─────────────────────────────────────────
function drawCloud(x,y){
  ctx.beginPath();
  ctx.arc(x,y,18,0,Math.PI*2);
  ctx.arc(x+22,y-10,24,0,Math.PI*2);
  ctx.arc(x+48,y,16,0,Math.PI*2);
  ctx.fill();
}

function drawMario(px,py,facing,frame,onGround){
  ctx.save();
  if(facing<0){ctx.translate(px+PW,py);ctx.scale(-1,1);ctx.translate(-PW,0);}
  else ctx.translate(px,py);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath();ctx.ellipse(PW/2,PH+3,PW/2,5,0,0,Math.PI*2);ctx.fill();
  // Shoes
  ctx.fillStyle='#4E342E';
  if(frame===1&&onGround){ctx.fillRect(2,30,12,6);ctx.fillRect(14,28,10,5);}
  else if(frame===2&&onGround){ctx.fillRect(2,28,10,5);ctx.fillRect(12,30,12,6);}
  else{ctx.fillRect(2,30,10,6);ctx.fillRect(14,30,10,6);}
  // Overalls
  ctx.fillStyle='#1565C0';ctx.fillRect(4,16,20,16);
  ctx.fillStyle='#FFD600';ctx.fillRect(7,16,3,3);ctx.fillRect(18,16,3,3);
  // Shirt
  ctx.fillStyle='#C62828';ctx.fillRect(2,19,24,10);
  // Gloves
  ctx.fillStyle='#FAFAFA';ctx.fillRect(0,21,5,6);ctx.fillRect(23,21,5,6);
  // Head
  ctx.fillStyle='#F4A460';ctx.fillRect(5,5,18,14);
  // Eye
  ctx.fillStyle='#1A1A1A';ctx.fillRect(15,9,4,4);
  ctx.fillStyle='#FAFAFA';ctx.fillRect(16,10,2,2);
  // Mustache
  ctx.fillStyle='#4E342E';ctx.fillRect(8,16,12,3);ctx.fillRect(6,14,5,3);
  // Hat
  ctx.fillStyle='#C62828';ctx.fillRect(3,0,22,7);ctx.fillRect(1,5,26,4);
  ctx.fillStyle='#AD1010';ctx.fillRect(1,8,26,2);
  ctx.restore();
}

// ─── Main Loop ───────────────────────────────────────
function loop(){
  if(screen!=='playing') return;
  const lvl=LEVELS[gs.levelIdx];
  const p=gs.player;
  gs.time++;

  // Goal celebration
  if(gs.goalReached){
    gs.victimTimer++;
    if(gs.victimTimer===5) p.vy=JVEL*0.85;
    if(gs.victimTimer===70){
      totalScore+=gs.coinsCollected*10;
      if(gs.levelIdx>=LEVELS.length-1){
        document.getElementById('win-score').textContent='Score: '+totalScore;
        goToScreen('complete');
      } else {
        document.getElementById('lc-stars').textContent='Stars: ⭐ '+gs.coinsCollected+'/'+gs.coins.length;
        document.getElementById('lc-score').textContent='Score: '+totalScore;
        goToScreen('levelComplete');
      }
      return;
    }
  }

  // Input
  if(!gs.goalReached){
    if(keys.left){p.vx=-RUN;p.facing=-1;}
    else if(keys.right){p.vx=RUN;p.facing=1;}
    else p.vx*=0.72;
    if(keys.jump&&p.onGround&&!jumpConsumed){p.vy=JVEL;p.onGround=false;jumpConsumed=true;}
  }
  if(!keys.jump) jumpConsumed=false;

  // Physics
  p.vy=Math.min(p.vy+GRAV,14);
  p.x+=p.vx;
  p.x=Math.max(0,Math.min(lvl.worldW-PW,p.x));
  const prevY=p.y;
  p.y+=p.vy;
  p.onGround=false;

  for(const pl of lvl.platforms){
    if(p.x+PW<=pl.x||p.x>=pl.x+pl.w) continue;
    const pb=prevY+PH,cb=p.y+PH;
    if(p.vy>=0&&pb<=pl.y+2&&cb>=pl.y){p.y=pl.y-PH;p.vy=0;p.onGround=true;}
    if(p.vy<0&&p.y<pl.y+pl.h&&prevY>=pl.y+pl.h-1){p.y=pl.y+pl.h;p.vy=2;}
  }

  // Respawn (no death)
  if(p.y>GH+80){p.x=lvl.start[0];p.y=lvl.start[1];p.vx=0;p.vy=0;}

  // Camera
  const tc=Math.max(0,Math.min(lvl.worldW-GW,p.x-GW*0.35));
  gs.camX+=(tc-gs.camX)*0.1;

  // Coins
  for(const c of gs.coins){
    if(!c.collected&&p.x+PW>c.x&&p.x<c.x+16&&p.y+PH>c.y&&p.y<c.y+16){
      c.collected=true;gs.coinsCollected++;
      for(let i=0;i<8;i++) gs.particles.push({x:c.x+8,y:c.y+8,vx:(Math.random()-.5)*5,vy:-Math.random()*5-2,life:40});
    }
  }
  for(const pt of gs.particles){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.28;pt.life--;}
  gs.particles=gs.particles.filter(pt=>pt.life>0);

  // Walk anim
  if(Math.abs(p.vx)>0.4&&p.onGround){if(++p.frameTimer>8){p.frameTimer=0;p.frame=(p.frame+1)%3;}}
  else p.frame=p.onGround?0:1;

  // Goal
  if(!gs.goalReached&&p.x+PW>lvl.flagX&&p.x<lvl.flagX+24) gs.goalReached=true;

  // ─── RENDER ───
  const sg=ctx.createLinearGradient(0,0,0,GH);
  sg.addColorStop(0,lvl.sky[0]);sg.addColorStop(1,lvl.sky[1]);
  ctx.fillStyle=sg;ctx.fillRect(0,0,GW,GH);

  // Stars (world 5)
  if(gs.levelIdx===4){
    [[30,18],[95,48],[175,12],[270,68],[345,32],[18,88],[245,46],[160,86],[78,118],[315,95],[200,130],[50,142],[290,155],[140,38]].forEach(([sx,sy])=>{
      ctx.fillStyle=`rgba(255,255,255,${0.3+0.7*Math.abs(Math.sin(gs.time*0.035+sx))})`;
      ctx.fillRect(sx,sy,2,2);
    });
  }

  // Clouds
  ctx.fillStyle='rgba(255,255,255,0.55)';
  [[80,68],[240,48],[500,78],[780,58],[1080,74]].forEach(([cx,cy])=>drawCloud(cx-gs.camX*0.22,cy));

  ctx.save();
  ctx.translate(-gs.camX,0);

  // Platforms
  for(const pl of lvl.platforms){
    const isG=pl.y>=430;
    ctx.fillStyle=isG?lvl.gBody:'#8D5524';ctx.fillRect(pl.x,pl.y+6,pl.w,pl.h-6);
    ctx.fillStyle=isG?lvl.gTop:'#C68642';ctx.fillRect(pl.x,pl.y,pl.w,6);
    if(!isG){
      ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;
      for(let bx=pl.x;bx<=pl.x+pl.w;bx+=20){ctx.beginPath();ctx.moveTo(bx,pl.y);ctx.lineTo(bx,pl.y+pl.h);ctx.stroke();}
      ctx.beginPath();ctx.moveTo(pl.x,pl.y+9);ctx.lineTo(pl.x+pl.w,pl.y+9);ctx.stroke();
    }
    ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(pl.x,pl.y+pl.h-3,pl.w,3);
  }

  // Flag
  const fx=lvl.flagX;
  ctx.fillStyle='#9E9E9E';ctx.fillRect(fx+9,GH-205,5,165);
  ctx.fillStyle=gs.goalReached?'#FFD600':'#EF5350';
  ctx.beginPath();ctx.moveTo(fx+14,GH-205);ctx.lineTo(fx+46,GH-188);ctx.lineTo(fx+14,GH-171);ctx.closePath();ctx.fill();
  ctx.fillStyle='#757575';ctx.fillRect(fx+3,GH-44,22,6);

  // Coins
  for(const c of gs.coins){
    if(c.collected) continue;
    const bob=Math.sin(gs.time*0.07+c.x*0.08)*3;
    const cg=ctx.createRadialGradient(c.x+8,c.y+8+bob,2,c.x+8,c.y+8+bob,9);
    cg.addColorStop(0,'#FFFDE7');cg.addColorStop(0.5,'#FFD600');cg.addColorStop(1,'#F57F17');
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(c.x+8,c.y+8+bob,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.beginPath();ctx.arc(c.x+5,c.y+5+bob,3,0,Math.PI*2);ctx.fill();
  }

  // Particles
  for(const pt of gs.particles){
    ctx.globalAlpha=pt.life/40;ctx.fillStyle='#FFD600';ctx.fillRect(pt.x-3,pt.y-3,6,6);
  }
  ctx.globalAlpha=1;

  drawMario(p.x,p.y,p.facing,p.frame,p.onGround);
  ctx.restore();

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.62)';ctx.fillRect(0,0,GW,40);
  ctx.fillStyle='#FFD600';ctx.font="bold 13px 'Courier New'";ctx.textAlign='left';
  ctx.fillText(`⭐ ${gs.coinsCollected}/${gs.coins.length}`,10,26);
  ctx.fillStyle='#FFF';ctx.textAlign='center';ctx.fillText(lvl.name,GW/2,26);
  ctx.fillStyle='#64FFDA';ctx.textAlign='right';ctx.fillText(`LV ${gs.levelIdx+1}/5`,GW-10,26);
  ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(0,38,GW,3);
  ctx.fillStyle='#FFD600';ctx.fillRect(0,38,GW*Math.min(1,p.x/(lvl.worldW-PW-100)),3);
  if(gs.goalReached&&gs.victimTimer%10<5){ctx.fillStyle='rgba(255,220,0,0.07)';ctx.fillRect(0,0,GW,GH);}

  raf=requestAnimationFrame(loop);
}

// ─── Keyboard ────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(['ArrowLeft','a','A'].includes(e.key)) keys.left=true;
  if(['ArrowRight','d','D'].includes(e.key)) keys.right=true;
  if(['ArrowUp','w','W',' '].includes(e.key)){keys.jump=true;e.preventDefault();}
});
document.addEventListener('keyup',e=>{
  if(['ArrowLeft','a','A'].includes(e.key)) keys.left=false;
  if(['ArrowRight','d','D'].includes(e.key)) keys.right=false;
  if(['ArrowUp','w','W',' '].includes(e.key)) keys.jump=false;
});

// ─── Touch controls ──────────────────────────────────
function bindBtn(id,key){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false},{passive:false});
  el.addEventListener('touchcancel',e=>{e.preventDefault();keys[key]=false},{passive:false});
  el.addEventListener('mousedown',()=>keys[key]=true);
  el.addEventListener('mouseup',()=>keys[key]=false);
  el.addEventListener('mouseleave',()=>keys[key]=false);
}
bindBtn('btn-left','left');
bindBtn('btn-right','right');
bindBtn('btn-jump','jump');

// ─── Screen buttons ──────────────────────────────────
document.getElementById('btn-start').addEventListener('click',()=>{
  totalScore=0;initLevel(0);goToScreen('playing');
});
document.getElementById('btn-next').addEventListener('click',()=>{
  initLevel(gs.levelIdx+1);goToScreen('playing');
});
document.getElementById('btn-again').addEventListener('click',()=>{
  totalScore=0;initLevel(0);goToScreen('playing');
});

// Resize for different screen sizes
function resize(){
  const maxW=Math.min(window.innerWidth,420);
  const maxH=window.innerHeight-180;
  const scale=Math.min(maxW/380, maxH/480, 1);
  document.getElementById('frame').style.transform=`scale(${scale})`;
  document.getElementById('frame').style.transformOrigin='top center';
  document.getElementById('controls').style.width=(380*scale)+'px';
}
window.addEventListener('resize',resize);
resize();

// Prevent context menu & scroll
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
</script>
</body>
